apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ops-assistant
  namespace: ai-ops
  labels:
    app: ai-ops-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ops-assistant
  template:
    metadata:
      labels:
        app: ai-ops-assistant
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ai-ops-assistant
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: yasindumalmith/ai-ops-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: ANTHROPIC_API_KEY
            - name: PROMETHEUS_URL
              value: "http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: DATABASE_URL
            - name: BACKEND_URL
              # Use host.docker.internal if using Docker Desktop, or host.minikube.internal for Minikube
              value: "http://host.minikube.internal:4000"
            - name: EMBEDDER_URL
              value: "http://ai-ops-embedder.ai-ops.svc.cluster.local:8001"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
